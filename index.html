<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>東京出差數位手冊 2026</title>
    <!-- 引入 Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 React 與 Babel CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    
    <style>
        /* 導入現代無襯線與優雅明體 */
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Noto+Serif+TC:wght@500;700&display=swap');
        
        body {
            background-color: #F5F4F0; 
            font-family: 'Noto Sans TC', sans-serif;
            -webkit-tap-highlight-color: transparent;
            color: #3D3935;
        }

        .font-serif-tc {
            font-family: 'Noto Serif TC', serif;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .fade-in {
            animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .pb-safe {
            padding-bottom: env(safe-area-inset-bottom);
        }

        .shadow-soft {
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.04);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        
        const SafeIcon = ({ name, size = 24, className = "", strokeWidth = 2 }) => {
            const icons = {
                'briefcase': <path d="M16 20V4a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16 M2 10h20 M6 14h12" />,
                'calendar': <path d="M8 2v4 M16 2v4 M3 10h18 M5 4h14a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2z" />,
                'train': <path d="M4 11h16 M12 3v8 M8 19l-2 3 M18 22l-2-3 M8 15h0 M16 15h0 M4 3h16v13a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V3z" />,
                'ticket': <path d="M2 9a3 3 0 0 1 0 6v2a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-2a3 3 0 0 1 0-6V7a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2Z M13 5v2 M13 17v2 M13 11v2" />,
                'utensils': <path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2 M7 2v20 M21 15V2v0a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7" />,
                'clock': <path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z M12 6v6l4 2" />,
                'chevron-right': <path d="m9 18 6-6-6-6" />,
                'cloud-sun': <path d="M12 2v2 M4.93 4.93l1.41 1.41 M20 12h2 M19.07 4.93l-1.41 1.41 M15.947 8.68c-.022-.073-.046-.145-.072-.216A5 5 0 0 0 5.9 8.24 4 4 0 0 0 4 16h3 M13 16a5 5 0 1 0 0-10" />,
                'sun': <path d="M12 2v2 M12 20v2 M4.93 4.93l1.41 1.41 M17.66 17.66l1.41 1.41 M2 12h2 M20 12h2 M6.34 17.66l-1.41 1.41 M19.07 4.93l-1.41 1.41 M16 12a4 4 0 1 1-8 0 4 4 0 0 1 8 0z" />,
                'cloud-rain': <path d="M4 14.899A7 7 0 1 1 15.71 8h1.79a4.5 4.5 0 0 1 2.5 8.242 M16 14v6 M8 14v6 M12 16v6" />,
                'cloud': <path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9Z" />,
                'plane': <path d="M17.8 19.2 16 11l3.5-3.5C21 6 21.5 4 21 3c-.5-.5-2.5 0-4.5 1.5L13 8 4.8 6.2c-.5-.1-.9.2-1.1.6L3 8l6 5-4 4-2.5-1.5L1 17l4.5 2 2 4.5 1.5-1.5L7.5 19l4-4 5 6c.4.2.8-.2.7-.7z" />,
                'hotel': <path d="M10 22v-6.57 M12 11h.01 M12 7h.01 M14 15.43V22 M15 16a5 5 0 0 0-6 0 M16 11h.01 M16 7h.01 M8 11h.01 M8 7h.01 M4 2v20h16V2z" />,
                'map-pin': <path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z M12 13a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z" />,
                'navigation': <path d="m3 11 19-9-9 19-2-8-8-2z" />,
                'arrow-right-left': <path d="m16 3 4 4-4 4 M20 7H4 M8 21l-4-4 4-4 M4 17h16" />,
                'sparkles': <path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z M5 3l.733 2.2a.5.5 0 0 1-.333.667L3 6l2.4.8a.5.5 0 0 1 .333.667L6 9l.733-2.2a.5.5 0 0 1 .333-.667L9 6l-2.4-.8a.5.5 0 0 1-.333-.667L6 3Z" />,
                'footprints': <path d="M4 16v-2.38C4 11.5 2.97 10.5 3 8c.03-2.72 1.49-6 4.5-6C9.37 2 10 3.8 10 5.5c0 3.11-2 5.66-2 8.68V16a2 2 0 1 1-4 0ZM20 20v-2.38c0-2.12 1.03-3.12 1-5.62-.03-2.72-1.49-6-4.5-6C14.63 6 14 7.8 14 9.5c0 3.11 2 5.66 2 8.68V20a2 2 0 1 0 4 0Z M16 17h4 M4 13h4" />,
                'smartphone': <path d="M5 4a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v16a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V4z M12 18h.01" />,
                'scan-line': <path d="M3 7V5a2 2 0 0 1 2-2h2 M17 3h2a2 2 0 0 1 2 2v2 M21 17v2a2 2 0 0 1-2 2h-2 M7 21H5a2 2 0 0 1-2-2v-2 M7 12h10" />,
                'external-link': <path d="M15 3h6v6 M10 14 21 3 M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" />,
                'loader': <path d="M12 2v4 M12 18v4 M4.93 4.93l2.83 2.83 M16.24 16.24l2.83 2.83 M2 12h4 M18 12h4 M4.93 19.07l2.83-2.83 M16.24 7.76l2.83-2.83" />,
                'qr-code': <><rect width="5" height="5" x="3" y="3" rx="1" /><rect width="5" height="5" x="16" y="3" rx="1" /><rect width="5" height="5" x="3" y="16" rx="1" /><path d="M21 16h-3a2 2 0 0 0-2 2v3" /><path d="M21 21v.01" /><path d="M12 7v3a2 2 0 0 1-2 2H7" /><path d="M3 12h.01" /><path d="M12 3h.01" /><path d="M12 16v.01" /><path d="M16 12h1" /><path d="M21 12v.01" /><path d="M12 21v-1" /></>,
                'file-text': <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z M14 2v6h6" />,
                'info': <><circle cx="12" cy="12" r="10" /><path d="M12 16v-4" /><path d="M12 8h.01" /></>,
                'camera': <path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z M12 13a3 3 0 1 0 0-6 3 3 0 0 0 0 6z" />
            };

            return (
                <svg 
                    xmlns="http://www.w3.org/2000/svg" 
                    width={size} 
                    height={size} 
                    viewBox="0 0 24 24" 
                    fill="none" 
                    stroke="currentColor" 
                    strokeWidth={strokeWidth} 
                    strokeLinecap="round" 
                    strokeLinejoin="round" 
                    className={`flex-shrink-0 ${className}`}
                >
                    {icons[name]}
                </svg>
            );
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState('overview');
            const [timeLeft, setTimeLeft] = useState('');
            const [weatherData, setWeatherData] = useState([]);
            const [isWeatherLoading, setIsWeatherLoading] = useState(true);
            const mainRef = useRef(null);

            const VERSION = "v2.34.0";
            const TICKET_QR_URL = "https://l-tike.com/qr/reserved/?page=669698055061";
            const TRAIN_TICKET_URL = "https://drive.google.com/file/d/1iiaPHAhFgGanwmOgcAgvw5MpMeLMJGEu/view?usp=drive_link";
            const HOTEL_MAP_URL = "https://www.google.com/maps/search/?api=1&query=Shinjuku+Washington+Hotel+Main+Building";
            const EXHIBITION_MAP_URL = "https://www.google.com/maps/search/?api=1&query=IMAGINUS+Suginami+Science+Education+Center";
            const AIRPORT_MAP_URL = "https://www.google.com/maps/search/?api=1&query=Narita+Airport+Terminal+2";

            const PDF_FLIGHT_YU = "https://drive.google.com/file/d/1lLNEK8CmOPTm5RBSR7qcAQYbRFqlug_Q/view?usp=drive_link";
            const PDF_FLIGHT_JUN = "https://drive.google.com/file/d/10Mi1RpNO7-UEUTUtPIbct75ykxx5_UkX/view?usp=drive_link";
            const PDF_HOTEL_YU = "https://drive.google.com/file/d/1TuZaduML9abbujwxrHpgmM9y0OSMuhJV/view?usp=drive_link";
            const PDF_HOTEL_JUN = "https://drive.google.com/file/d/1KEdPtfAyZ0BVHgKBWtymfK4oITDWX-MB/view?usp=drive_link";

            const FOOD_LINKS = {
                negishi: "https://www.google.com/maps/search/?api=1&query=Negishi+Shinjuku+Nishiguchi",
                fuunji: "https://www.google.com/maps/search/?api=1&query=Fuunji+Shinjuku",
                udonshin: "https://www.google.com/maps/search/?api=1&query=Udon+Shin+Shinjuku",
                motomura: "https://www.google.com/maps/search/?api=1&query=Gyukatsu+Motomura+Shinjuku+Minamiguchi",
                musashi: "https://www.google.com/maps/search/?api=1&query=Menya+Musashi+Niten+Shinjuku"
            };

            const ATTRACTION_LINKS = {
                gyoen: "https://www.google.com/maps/search/?api=1&query=Shinjuku+Gyoen+National+Garden",
                broadway: "https://www.google.com/maps/search/?api=1&query=Nakano+Broadway"
            };

            const NEX_TIMETABLE = {
                arrival: [
                    { id: "40號", dep: "17:16", arr: "18:46", note: "最佳方案" },
                    { id: "42號", dep: "17:45", arr: "19:18", note: "次選建議" },
                    { id: "44號", dep: "18:15", arr: "19:45", note: "稍晚建議" }
                ],
                departure: [
                    { id: "21號", dep: "11:08", arr: "12:26", note: "充裕方案" },
                    { id: "23號", dep: "11:38", arr: "12:56", note: "最推薦" },
                    { id: "25號", dep: "12:08", arr: "13:26", note: "最後底限" }
                ]
            };

            useEffect(() => {
                if (mainRef.current) {
                    mainRef.current.scrollTo(0, 0);
                }
            }, [activeTab]);

            useEffect(() => {
                const fetchWeather = async () => {
                    setIsWeatherLoading(true);
                    try {
                        const res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=35.6895&longitude=139.6917&daily=weather_code,temperature_2m_max,temperature_2m_min&timezone=Asia%2FTokyo&forecast_days=16');
                        const data = await res.json();
                        const targetDates = ['2026-03-19', '2026-03-20', '2026-03-21', '2026-03-22'];
                        const labels = ['3/19 (四)', '3/20 (五)', '3/21 (六)', '3/22 (日)'];

                        const mappedWeather = targetDates.map((dateStr, index) => {
                            const dayIdx = data.daily.time.indexOf(dateStr);
                            if (dayIdx !== -1) {
                                const maxT = Math.round(data.daily.temperature_2m_max[dayIdx]);
                                const minT = Math.round(data.daily.temperature_2m_min[dayIdx]);
                                const code = data.daily.weather_code[dayIdx];
                                let icon = 'cloud';
                                let color = 'text-stone-400';
                                if (code <= 1) { icon = 'sun'; color = 'text-amber-500'; }
                                else if (code <= 3) { icon = 'cloud-sun'; color = 'text-stone-500'; }
                                else if (code >= 51) { icon = 'cloud-rain'; color = 'text-slate-500'; }
                                return { date: labels[index], temp: `${maxT}°/${minT}°`, icon, color };
                            }
                            return null;
                        }).filter(Boolean);

                        if (mappedWeather.length === 4) setWeatherData(mappedWeather);
                        else throw new Error();
                    } catch (err) {
                        setWeatherData([
                            { date: '3/19 (四)', temp: '16°/9°', icon: 'cloud-rain', color: 'text-slate-500' },
                            { date: '3/20 (五)', temp: '16°/8°', icon: 'cloud-rain', color: 'text-slate-500' },
                            { date: '3/21 (六)', temp: '17°/8°', icon: 'cloud-sun', color: 'text-stone-500' },
                            { date: '3/22 (日)', temp: '18°/8°', icon: 'cloud', color: 'text-stone-400' },
                        ]);
                    } finally {
                        setIsWeatherLoading(false);
                    }
                };
                fetchWeather();
            }, []);

            useEffect(() => {
                const targetDate = new Date('2026-03-19T12:50:00').getTime();
                const timer = setInterval(() => {
                    const now = new Date().getTime();
                    const diff = targetDate - now;
                    if (diff < 0) {
                        setTimeLeft('行程進行中');
                        clearInterval(timer);
                    } else {
                        const days = Math.floor(diff / (1000 * 60 * 60 * 24));
                        const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                        setTimeLeft(`${days}天 ${hours}時`);
                    }
                }, 1000);
                return () => clearInterval(timer);
            }, []);

            const renderContent = () => {
                switch (activeTab) {
                    case 'overview':
                        return (
                            <div className="space-y-6 fade-in pb-6">
                                <div className="bg-stone-800 p-6 rounded-[2rem] text-white shadow-soft relative overflow-hidden min-h-[180px] flex flex-col justify-end">
                                    <img src="https://images.unsplash.com/photo-1540959733332-eab4deabeeaf?q=80&w=800&auto=format&fit=crop" alt="Tokyo" className="absolute inset-0 w-full h-full object-cover opacity-30 mix-blend-luminosity" />
                                    <div className="absolute inset-0 bg-gradient-to-t from-stone-900/90 to-transparent"></div>
                                    <div className="relative z-10">
                                        <p className="text-stone-300 text-sm font-bold uppercase tracking-[0.2em] mb-1">Tokyo Mission</p>
                                        <h2 className="text-3xl font-serif-tc font-bold mb-1 tracking-wide text-white">東京出差 <span className="text-2xl text-white">2026</span></h2>
                                        <div className="flex items-center gap-2 mt-3 bg-white/10 w-fit px-4 py-2 rounded-full backdrop-blur-sm border border-white/10">
                                            <SafeIcon name="clock" size={16} className="text-stone-200" />
                                            <span className="font-mono font-bold text-lg tracking-wider text-white">{timeLeft}</span>
                                        </div>
                                    </div>
                                </div>

                                <section>
                                    <h3 className="text-xl font-serif-tc font-bold text-stone-800 mb-3 px-1 flex items-center gap-2">
                                        <SafeIcon name="cloud-sun" size={22} className="text-stone-500" /> 東京預報 
                                        {isWeatherLoading && <span className="text-[10px] bg-stone-200 text-stone-600 px-2 py-0.5 rounded-full ml-1">即時更新中...</span>}
                                    </h3>
                                    <div className="flex overflow-x-auto gap-3 pb-4 no-scrollbar px-1">
                                        {weatherData.map((w, i) => (
                                            <div key={i} className="min-w-[100px] bg-white p-5 rounded-3xl shadow-soft border border-stone-100 flex flex-col items-center text-center text-gray-800">
                                                <p className="text-xs font-bold text-stone-400 tracking-wider">{w.date}</p>
                                                <div className="my-3 text-stone-600">
                                                    {isWeatherLoading ? <SafeIcon name="loader" size={24} className="animate-spin text-stone-300" /> : <SafeIcon name={w.icon} size={28} className={w.color} />}
                                                </div>
                                                <p className="font-bold text-[15px] text-stone-800">{isWeatherLoading ? '--' : w.temp}</p>
                                            </div>
                                        ))}
                                    </div>
                                </section>

                                <section className="bg-white rounded-3xl p-6 shadow-soft border border-stone-100 space-y-6">
                                    <h3 className="text-xl font-serif-tc font-bold flex items-center gap-2 border-b border-stone-50 pb-3 text-stone-800"><SafeIcon name="plane" className="text-slate-500" size={22} /> 航班詳細資訊</h3>
                                    <div className="space-y-4">
                                        <div className="flex justify-between items-center"><span className="text-xs font-bold bg-slate-50 text-slate-600 px-3 py-1.5 rounded-lg tracking-widest">去程 3/19</span><span className="text-sm font-bold text-stone-400">CX450</span></div>
                                        <div className="flex justify-between px-2 items-center">
                                            <div><p className="text-2xl font-bold font-mono text-stone-800 leading-none">12:50</p><p className="text-[13px] font-bold text-stone-400 mt-2 text-nowrap">台北 TPE T1</p></div>
                                            <div className="flex-1 px-4 opacity-20 relative h-6 flex items-center">
                                                <div className="w-full h-[1.5px] bg-stone-800 rounded-full"></div>
                                                <SafeIcon name="plane" size={16} className="absolute left-1/2 -translate-x-1/2 bg-white px-1 text-stone-800" />
                                            </div>
                                            <div className="text-right"><p className="text-2xl font-bold font-mono text-stone-800 leading-none">16:50</p><p className="text-[13px] font-bold text-stone-400 mt-2 text-right text-nowrap">東京 NRT T2</p></div>
                                        </div>
                                    </div>
                                    <div className="border-t border-dashed border-stone-200 pt-2"></div>
                                    <div className="space-y-4">
                                        <div className="flex justify-between items-center"><span className="text-xs font-bold bg-stone-100 text-stone-600 px-3 py-1.5 rounded-lg tracking-widest">回程 3/22</span><span className="text-sm font-bold text-stone-400">CX451</span></div>
                                        <div className="flex justify-between px-2 items-center">
                                            <div><p className="text-2xl font-bold font-mono text-stone-800 leading-none">15:30</p><p className="text-[13px] font-bold text-stone-400 mt-2 text-nowrap">東京 NRT T2</p></div>
                                            <div className="flex-1 px-4 opacity-20 relative h-6 flex items-center">
                                                <div className="w-full h-[1.5px] bg-stone-800 rounded-full"></div>
                                                <SafeIcon name="plane" size={16} className="absolute left-1/2 -translate-x-1/2 bg-white px-1 rotate-180 text-stone-800" />
                                            </div>
                                            <div className="text-right"><p className="text-2xl font-bold font-mono text-stone-800 leading-none">18:40</p><p className="text-[13px] font-bold text-stone-400 mt-2 text-right text-nowrap">台北 TPE T1</p></div>
                                        </div>
                                    </div>
                                    <div className="pt-2">
                                        <p className="text-xs font-bold text-stone-400 uppercase tracking-widest mb-3 flex items-center gap-1.5 font-bold"><SafeIcon name="file-text" size={14} /> 電子機票 PDF 察看</p>
                                        <div className="grid grid-cols-2 gap-3 text-stone-700">
                                            <a href={PDF_FLIGHT_YU} target="_blank" className="bg-stone-100 hover:bg-stone-200 py-3 rounded-xl font-bold text-[14px] flex items-center justify-center transition-all active:scale-[0.98]">友豪機票</a>
                                            <a href={PDF_FLIGHT_JUN} target="_blank" className="bg-stone-100 hover:bg-stone-200 py-3 rounded-xl font-bold text-[14px] flex items-center justify-center transition-all active:scale-[0.98]">駿弘機票</a>
                                        </div>
                                    </div>
                                </section>

                                <section className="bg-white rounded-3xl p-6 shadow-soft border border-stone-100 space-y-5">
                                    <h3 className="text-xl font-serif-tc font-bold flex items-center gap-2 border-b border-stone-50 pb-3 text-stone-800"><SafeIcon name="hotel" className="text-stone-500" size={22} /> 住宿飯店</h3>
                                    <div>
                                        <h4 className="font-bold text-2xl text-stone-800 font-serif-tc tracking-wide">新宿華盛頓酒店</h4>
                                        <p className="text-sm text-gray-400 font-bold uppercase mt-1 tracking-widest">Shinjuku Washington</p>
                                    </div>
                                    <div className="bg-[#FAF8F5] p-5 rounded-2xl border border-stone-100 space-y-5 text-gray-800">
                                        <p className="text-[15px] text-stone-600 font-bold flex items-start gap-2 leading-relaxed">
                                            <SafeIcon name="map-pin" size={18} className="text-stone-400 mt-1 flex-shrink-0" />
                                            東京都新宿區西新宿 3-2-9
                                        </p>
                                        <a href={HOTEL_MAP_URL} target="_blank" className="w-full bg-slate-700 hover:bg-slate-800 text-white py-4 rounded-xl font-bold text-[15px] tracking-wide flex items-center justify-center gap-2 shadow-sm active:scale-[0.98] transition-all">
                                            <SafeIcon name="navigation" size={16} /> 開啟飯店地圖導航
                                        </a>
                                        <div className="pt-2 border-t border-stone-200/60 mt-4 text-stone-700 font-bold">
                                            <p className="text-xs font-bold text-stone-400 uppercase tracking-widest mb-3 flex items-center gap-1.5 font-bold"><SafeIcon name="file-text" size={14} /> 入住房券 PDF 察看</p>
                                            <div className="grid grid-cols-2 gap-3">
                                                <a href={PDF_HOTEL_YU} target="_blank" className="bg-white border border-stone-200 py-3 rounded-xl font-bold text-[14px] flex items-center justify-center transition-all active:scale-[0.98]">友豪房券</a>
                                                <a href={PDF_HOTEL_JUN} target="_blank" className="bg-white border border-stone-200 py-3 rounded-xl font-bold text-[14px] flex items-center justify-center transition-all active:scale-[0.98]">駿弘房券</a>
                                            </div>
                                        </div>

                                                    <span className="w-5 h-5 rounded-full bg-indigo-100 text-indigo-600 flex-shrink-0 flex items-center justify-center text-[10px] mt-0.5">2</span>
                                                    <span>機器機身多為**深灰色/黑色**，螢幕右上角切換**「繁體中文」**。</span>
                                                </li>
                                                <li className="flex items-start gap-2">
                                                    <span className="w-5 h-5 rounded-full bg-indigo-100 text-indigo-600 flex-shrink-0 flex items-center justify-center text-[10px] mt-0.5">3</span>
                                                    <span>點選螢幕上的**「讀取QR碼/領取已訂票券」**按鈕，並掃描下方憑證。</span>
                                                </li>
                                            </ul>
                                        </div>
                                        <div className="p-4 bg-amber-50 rounded-2xl border border-amber-100 text-gray-800">
                                            <p className="text-xs font-bold text-amber-600 tracking-widest mb-1.5 flex items-center gap-1.5 font-bold"><SafeIcon name="info" size={12} /> 車站位置提醒</p>
                                            <p className="text-[13px] text-amber-800 leading-relaxed font-bold">南口位於車站 2 樓。領票後可直接進入南口改札，前往距離最近的 5、6 號月台。</p>
                                        </div>
                                        <a href={TRAIN_TICKET_URL} target="_blank" className="mt-2 inline-flex items-center justify-center gap-2 bg-indigo-600 text-white px-6 py-4 rounded-xl font-bold text-[15px] shadow-md w-full">開啟車票 QR 憑證 <SafeIcon name="external-link" size={16} /></a>
                                    </div>
                                </div>
                            </div>
                        );

                    default: return null;
                }
            };

            return (
                <div className="max-w-md mx-auto h-[100dvh] flex flex-col relative overflow-hidden bg-[#F5F4F0]">
                    <header className="bg-[#F5F4F0]/95 backdrop-blur-md px-6 pt-6 pb-4 flex justify-between items-center z-20 shadow-sm border-b border-stone-200/50">
                        <div className="flex items-center gap-3 text-stone-800">
                            <div className="w-10 h-10 bg-stone-800 rounded-[14px] flex items-center justify-center text-white font-serif-tc font-bold text-sm shadow-sm tracking-widest">TO</div>
                            <div><h1 className="text-[17px] font-bold tracking-widest uppercase leading-none font-serif-tc">TIGS 2026</h1></div>
                        </div>
                        <div className="text-[10px] font-bold text-stone-400 border border-stone-200 px-2.5 py-1 rounded-lg tracking-widest bg-white">{VERSION}</div>
                    </header>
                    <main ref={mainRef} className="flex-1 p-5 overflow-y-auto no-scrollbar pb-28 relative z-10 scroll-smooth">{renderContent()}</main>
                    <nav className="fixed bottom-0 w-full max-w-md left-1/2 -translate-x-1/2 bg-white/95 backdrop-blur-xl border-t border-stone-200 flex justify-around px-2 pb-safe pt-2 shadow-[0_-10px_40px_rgba(0,0,0,0.05)] z-[100]">
                        {[
                            { id: 'overview', icon: 'briefcase', label: '首頁' },
                            { id: 'schedule', icon: 'calendar', label: '行程' },
                            { id: 'transport', icon: 'train', label: '交通' },
                            { id: 'tickets', icon: 'ticket', label: '門票' },
                            { id: 'food', icon: 'utensils', label: '美食' },
                        ].map((tab) => (
                            <button key={tab.id} onClick={() => setActiveTab(tab.id)} className={`flex flex-col items-center justify-center flex-1 py-2 transition-all duration-300 relative ${activeTab === tab.id ? 'text-slate-700 font-bold' : 'text-stone-400'}`}>
                                <div className={`p-2 rounded-xl transition-all duration-300 ${activeTab === tab.id ? 'bg-slate-200/70' : 'bg-transparent'}`}>
                                    <SafeIcon name={tab.icon} size={22} strokeWidth={activeTab === tab.id ? 2.5 : 2} />
                                </div>
                                <span className={`text-[10px] mt-1 font-bold tracking-widest transition-all duration-300 ${activeTab === tab.id ? 'opacity-100' : 'opacity-0 scale-90 h-0 overflow-hidden'}`}>{tab.label}</span>
                            </button>
                        ))}
                    </nav>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
